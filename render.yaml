# Render Static Site Configuration
# This configuration deploys the frontend as a static site
# The backend API will be deployed separately as a Web Service

services:
  # Frontend Static Site
  - type: web
    name: niche-finder-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "frontend/dist"
    envVars:
      - key: PUBLIC_URL
        value: "https://niche-finder-frontend.onrender.com"
    
  # Backend API Service
  - type: web
    name: niche-finder-api
    env: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: "production"